plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.vaya.partner_app"
    compileSdk = 36
    ndkVersion = "26.1.10909125"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.vaya.partner_app"
        minSdkVersion = flutter.minSdkVersion
        targetSdk = 35
        versionCode = 2
        versionName = "1.0.1"
        manifestPlaceholders = [
            GOOGLE_MAPS_API_KEY: keystoreProperties.getProperty('GOOGLE_MAPS_API_KEY') ?: 'YOUR_MAPS_API_KEY_HERE'
        ]
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias'] ?: 'upload'
            keyPassword = keystoreProperties['keyPassword'] ?: ''
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword'] ?: ''
        }
    }

    buildTypes {
        release {
            signingConfig = keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
    implementation platform('com.google.firebase:firebase-bom:33.14.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-firestore'
    implementation 'com.google.firebase:firebase-messaging'
}

project.getTasks().withType(com.android.build.gradle.internal.tasks.CheckAarMetadataTask.class).configureEach {
    enabled = false
}
